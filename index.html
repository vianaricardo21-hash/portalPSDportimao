<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PSD Portimão</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Portal PSD Portimão</h1>
    <div id="documentContainer">
        <!-- Document tracking with ID -->
        <div class="document" data-id="1">
            <h2>Document Title</h2>
            <p>Document content...</p>
            <button class="delete-document">Delete Document</button>
        </div>
        
        <!-- Comments section -->
        <div class="comments">
            <h3>Comments</h3>
            <div class="comment" data-author="user123">
                <p>This is a comment from user123.</p>
                <button class="delete-comment">Delete</button>
            </div>
            <div class="comment" data-author="admin">
                <p>This is a comment from admin.</p>
                <button class="delete-comment">Delete</button>
            </div>
        </div>
    </div>
    <script>
        // Confirmation before delete action
        document.querySelectorAll('.delete-document').forEach(button => {
            button.addEventListener('click', function() {
                if (confirm('Are you sure you want to delete this document?')) {
                    // Delete document functionality
                }
            });
        });

        document.querySelectorAll('.delete-comment').forEach(button => {
            button.addEventListener('click', function() {
                const commentAuthor = this.closest('.comment').dataset.author;
                if (confirm(`Are you sure you want to delete your comment${commentAuthor !== 'admin' ? ' (if you are the author)' : ''}?`)) {
                    // Delete comment functionality
                }
            });
        });
    </script>
</body>
</html>
