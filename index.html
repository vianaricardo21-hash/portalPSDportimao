<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PSD Portimão</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Portal PSD Portimão</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#login">Login</a></li>
            <li><a href="#admin-panel">Admin Panel</a></li>
            <li><a href="#documents">Documents</a></li>
            <li><a href="#comments">Comments</a></li>
        </ul>
    </nav>
    <main>
        <section id="login">
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="admin-panel">
            <h2>Admin Panel</h2>
            <form id="publish-form">
                <input type="text" placeholder="Document Title" required>
                <input type="url" placeholder="SharePoint Link" required>
                <button type="submit">Publish Document</button>
            </form>
            <div id="documents-list">
                <h3>Documents</h3>
                <ul id="documents"></ul>
            </div>
        </section>
        <section id="comments">
            <h2>Comments</h2>
            <form id="comment-form">
                <textarea placeholder="Submit your comment" required></textarea>
                <button type="submit">Submit Comment</button>
            </form>
            <div id="comments-list">
                <h3>Comments</h3>
                <ul id="comments"></ul>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Portal PSD Portimão | All Rights Reserved</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
